# .github/workflows/release-scanner.yml
#
# Builds unl-scanner and unl-server for Windows, Linux, and macOS on every
# tag push, attaches the binaries to a GitHub Release, and -
# because asset names are stable - scripts can always fetch the newest build:
#
#   https://github.com/taku25/UNL.nvim/releases/latest/download/unl-scanner-<target>[.exe]
#   https://github.com/taku25/UNL.nvim/releases/latest/download/unl-server-<target>[.exe]

name: Release Scanner

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            ext: ""
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          # We're gonna have to see if this even works - it's not getting picked up by any github runners...
          # - os: macos-13
          #   target: x86_64-apple-darwin
          #   ext: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scanner

      - name: Install cross (Linux aarch64 only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: >
          cargo build --release --manifest-path scanner/Cargo.toml
          --target ${{ matrix.target }}
          --bin unl-scanner --bin unl-server

      - name: Build (cross)
        if: matrix.use_cross == true
        run: >
          cross build --release --manifest-path scanner/Cargo.toml
          --target ${{ matrix.target }}
          --bin unl-scanner --bin unl-server

      - name: Rename artifacts to stable per-target names
        shell: bash
        run: |
          mkdir -p dist
          for bin in unl-scanner unl-server; do
            cp "scanner/target/${{ matrix.target }}/release/${bin}${{ matrix.ext }}" \
               "dist/${bin}-${{ matrix.target }}${{ matrix.ext }}"
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release and attach binaries
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: ${{ github.ref_type != 'tag' }}